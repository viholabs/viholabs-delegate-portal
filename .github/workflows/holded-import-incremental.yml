name: HOLDed — Import Incremental (Invoices)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: holded-import-incremental-invoices
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (FORZAR main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (show output)
        run: |
          set -euo pipefail
          echo "Node: $(node -v)"
          echo "PNPM: $(pnpm -v)"
          echo "Running tsc..."
          pnpm -s tsc --noEmit 2>&1 | tee tsc.log
          echo "TSC OK"

      - name: Set VIHO_GIT_SHA from checkout
        run: |
          set -euo pipefail
          echo "VIHO_GIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "CHECKOUT_SHA=$(git rev-parse HEAD)"
          echo "GITHUB_SHA=${GITHUB_SHA}"

      - name: Debug Holded Auth (Bearer vs key)
        env:
          HOLDED_API_KEY: ${{ secrets.HOLDED_API_KEY }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const key = (process.env.HOLDED_API_KEY || "").trim();
          if (!key) { console.error("HOLDED_API_KEY missing in workflow"); process.exit(1); }

          const url = "https://api.holded.com/api/invoicing/v1/documents/invoice?limit=1";

          async function probe(name, headers) {
            const r = await fetch(url, { headers: { accept: "application/json", ...headers } });
            const txt = await r.text().catch(()=> "");
            console.log("PROBE", name, "HTTP", r.status);
            console.log("body_head:", txt.slice(0, 200).replace(/\s+/g," ").trim() || "(empty)");
          }

          (async () => {
            await probe("Authorization Bearer", { Authorization: `Bearer ${key}` });
            await probe("Header key", { key });
          })().catch(e => { console.error(e); process.exit(1); });
          NODE

      - name: Run Holded Import (NO HTTP)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HOLDED_API_KEY: ${{ secrets.HOLDED_API_KEY }}
          LIMIT: "50"
          VIHO_GIT_SHA: ${{ env.VIHO_GIT_SHA }}
        run: |
          set -euo pipefail
          pnpm exec -- tsx scripts/holded-import-incremental.ts