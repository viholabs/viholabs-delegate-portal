name: Holded — Import Invoices Incremental

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max invoices to import"
        required: false
        default: "50"
      since:
        description: "Override since cursor (ISO). Empty = use DB cursor."
        required: false
        default: ""
      until:
        description: "Override until (ISO). Empty = now."
        required: false
        default: ""
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: holded-invoices-incremental
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Evidence (DB)
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}

      # Secrets
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      HOLDED_API_KEY: ${{ secrets.HOLDED_API_KEY }}

      # Inputs (optional)
      LIMIT: ${{ inputs.limit }}
      SINCE: ${{ inputs.since }}
      UNTIL: ${{ inputs.until }}

    steps:
      - name: Checkout (THIS commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run -s tsc -- --noEmit

      - name: Run Holded incremental import
        run: |
          echo "RUNNING SHA = $GITHUB_SHA"
          npx -y tsx -e "
            import { runHoldedInvoicesIncrementalImport } from './src/lib/holded/holdedImportIncrementalRunner';

            const limit = Number(process.env.LIMIT || '50');
            const sinceRaw = String(process.env.SINCE || '').trim();
            const untilRaw = String(process.env.UNTIL || '').trim();

            const args = {
              limit,
              since: sinceRaw ? sinceRaw : undefined,
              until: untilRaw ? untilRaw : undefined,
            };

            const res = await runHoldedInvoicesIncrementalImport(args);
            console.log(JSON.stringify(res, null, 2));
          "