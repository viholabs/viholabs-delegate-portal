name: Deploy to VPS (main)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: SSH deploy (pull, install, build, restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail

            echo "=== VIHOLABS DEPLOY START ==="
            date
            echo "USER=$(whoami)"
            echo "HOST=$(hostname)"
            echo "***"

            APP_DIR="/var/www/viholabs-delegate-portal"

            echo "=== 1) Verify path ==="
            if [ ! -d "$APP_DIR" ]; then
              echo "FATAL: APP_DIR does not exist: $APP_DIR"
              exit 2
            fi

            cd "$APP_DIR"
            echo "APP_DIR_OK=$(pwd)"

            echo "=== 2) Verify git repo ==="
            if [ ! -d ".git" ]; then
              echo "FATAL: Not a git repository: $APP_DIR"
              ls -la
              exit 3
            fi

            echo "REMOTE_URL=$(git remote get-url origin || true)"
            echo "BRANCH_BEFORE=$(git branch --show-current || true)"
            echo "HEAD_BEFORE=$(git rev-parse --short HEAD || true)"
            git status -sb || true

            echo "=== 3) Pull main deterministically ==="
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "BRANCH_AFTER=$(git branch --show-current)"
            echo "HEAD_AFTER=$(git rev-parse --short HEAD)"
            git log -1 --oneline

            echo "=== 4) Ensure pnpm exists ==="
            if ! command -v pnpm >/dev/null 2>&1; then
              echo "FATAL: pnpm not found on VPS. Install pnpm or enable corepack."
              echo "HINT: node --version && corepack enable && corepack prepare pnpm@9.15.5 --activate"
              exit 4
            fi
            echo "PNPM=$(pnpm --version)"

            echo "=== 5) Install deps (frozen) ==="
            pnpm install --frozen-lockfile

            echo "=== 6) Build ==="
            pnpm build

            echo "=== 7) Restart (pm2 canonical) ==="
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "FATAL: pm2 not found, cannot restart"
              exit 5
            fi

            pm2 ls || true

            if pm2 describe viholabs >/dev/null 2>&1; then
              pm2 restart viholabs --update-env
            else
              echo "FATAL: pm2 process 'viholabs' not found"
              exit 5
            fi

            echo "=== 8) Post-check ==="
            pm2 ls || true

            echo "=== 9) Health-check (status) ==="
            CODE="$(curl -sS -o /tmp/whoami.json -w "%{http_code}" https://portal.viholabs.com/api/auth/whoami)"
            echo "HEALTH_HTTP_CODE=$CODE"
            head -c 200 /tmp/whoami.json; echo
            test "$CODE" = "200"

            echo "=== VIHOLABS DEPLOY END ==="
            date

      - name: Deploy summary (success)
        if: ${{ success() }}
        run: |
          {
            echo "## ✅ Deploy OK"
            echo ""
            echo "- Repo: \`${GITHUB_REPOSITORY}\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- Target: \`portal.viholabs.com\`"
            echo "- Health: \`/api/auth/whoami\` returned 200"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy summary (failure)
        if: ${{ failure() }}
        run: |
          {
            echo "## ❌ Deploy FAILED"
            echo ""
            echo "- Repo: \`${GITHUB_REPOSITORY}\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- Check logs above for the failing step."
          } >> "$GITHUB_STEP_SUMMARY"